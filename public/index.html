<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inuu Market - Email Sender</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">Kirim Email via Gmail</h1>
        
        <div class="mb-6">
            <label class="block text-sm font-bold text-blue-700 mb-1">Pilih Template Pesanan:</label>
            <select id="templateSelect" class="w-full p-2 border-2 border-blue-200 rounded-md outline-none focus:border-blue-500 bg-blue-50">
                <option value="custom">-- Tulis Manual --</option>
                <option value="premium">🛡️ Akun Premium</option>
                <option value="topup">💎 Top Up Game</option>
            </select>
        </div>

        <form id="emailForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-semibold text-slate-500">Email Pengirim</label>
                    <input type="email" name="senderEmail" required value="choirulazzamibnu@gmail.com" class="w-full p-2 border rounded-md text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500">App Password</label>
                    <input type="password" name="appPassword" required value="xusdndaxgbcqgtwx" class="w-full p-2 border rounded-md text-sm outline-none">
                </div>
            </div>
            
            <hr>

            <div>
                <label class="block text-sm font-semibold text-slate-700">Email Penerima</label>
                <input type="email" name="receiverEmail" id="receiverEmail" required placeholder="konsumen@gmail.com" class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700">Subjek Email</label>
                <input type="text" name="subject" id="subjectInput" required placeholder="Masukkan subjek..." class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700">Isi Pesan</label>
                <textarea name="message" id="messageInput" required rows="6" placeholder="Isi pesan di sini..." class="w-full p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500 text-sm"></textarea>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700">Lampiran</label>
                <input type="file" name="attachments" multiple class="w-full text-sm text-slate-500">
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-md hover:bg-blue-700 transition">
                Kirim Email
            </button>
        </form>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div id="modalIcon" class="text-6xl mb-4"></div>
            <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
            <p id="modalMessage" class="text-gray-600 mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-slate-800 text-white py-2 rounded-md font-semibold">Tutup</button>
        </div>
    </div>

    <script>
        const templateSelect = document.getElementById('templateSelect');
        const subjectInput = document.getElementById('subjectInput');
        const messageInput = document.getElementById('messageInput');

        // DATA TEMPLATE
        const templates = {
            premium: {
                subject: "🛡️ Akun Premium Anda Siap Digunakan - Inuu Market",
                message: `Halo Kak, pesanan akun premium kamu sudah siap!\n\nData Login:\nEmail/ID: (isi di sini)\nPassword: (isi di sini)\n\nPanduan Penting:\n1. Gunakan profil yang sudah ditentukan (jika ada).\n2. Dilarang mengubah pengaturan pembayaran atau email akun.\n3. Jika ada kendala login, segera hubungi admin melalui WhatsApp.\n\nTerima kasih sudah memilih Inuu Market untuk langganan premium kamu!`
            },
            topup: {
                subject: "💎 Top Up Berhasil! Silakan Cek Game Anda - Inuu Market",
                message: `Halo Player!\n\nTop up untuk ID (Isi ID Game) telah berhasil kami kirimkan.\n\nRincian:\nProduk: (Misal: 500 Diamonds Mobile Legends)\nStatus: Berhasil Dikirim ✅\n\nSilakan relog atau cek saldo di dalam game secara berkala. Jika dalam 15 menit saldo belum masuk, hubungi admin dengan melampirkan screenshot bukti ini.\n\nSelamat bermain!\nTim Inuu Market`
            },
            custom: {
                subject: "",
                message: ""
            }
        };

        // LOGIKA GANTI TEMPLATE
        templateSelect.addEventListener('change', (e) => {
            const selected = templates[e.target.value];
            subjectInput.value = selected.subject;
            messageInput.value = selected.message;
        });

        // LOGIKA KIRIM (Sama seperti sebelumnya)
        const form = document.getElementById('emailForm');
        const modal = document.getElementById('modal');
        const btnSubmit = document.getElementById('btnSubmit');

        form.onsubmit = async (e) => {
            e.preventDefault();
            btnSubmit.innerText = "⏳ Sedang Mengirim...";
            btnSubmit.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (response.ok) {
                    showModal('✅', 'Berhasil!', 'Email pesanan sudah terkirim.');
                    messageInput.value = ""; 
                    document.getElementById('receiverEmail').value = "";
                } else {
                    showModal('❌', 'Gagal', result.error);
                }
            } catch (err) {
                showModal('⚠️', 'Error', 'Koneksi bermasalah.');
            } finally {
                btnSubmit.innerText = "Kirim Email";
                btnSubmit.disabled = false;
            }
        };

        function showModal(icon, title, msg) {
            document.getElementById('modalIcon').innerText = icon;
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = msg;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }
    </script>
</body>
</html>
