<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music - InuuTyzDev</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8A2BE2">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-purple: #8A2BE2;
            --secondary-purple: #4c1d95;
            --accent-cyan: #00f3ff;
            --sidebar-width: 280px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background-color: #050505; min-height: 100vh;
            background: radial-gradient(circle at 50% 20%, #1a0b2e 0%, #000 60%);
            background-size: 200% 200%; animation: bgPulse 10s ease infinite;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        @keyframes bgPulse { 0% { background-position: 50% 0%; } 50% { background-position: 50% 20%; } 100% { background-position: 50% 0%; } }

        .app-container {
            width: 100%; height: 100dvh; position: relative; display: flex; flex-direction: column;
            color: white; background: rgba(10, 10, 15, 0.95); overflow: hidden;
        }

        @media (min-width: 768px) {
            .app-container {
                width: 400px; height: 85vh; max-height: 900px; border-radius: 30px;
                border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 0 50px rgba(138, 43, 226, 0.3);
            }
            .main-content::-webkit-scrollbar { width: 5px; }
            .main-content::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        }

        header {
            height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 50;
        }
        
        .header-title {
            font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 800;
            background: linear-gradient(to right, #fff, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .icon-btn {
            background: rgba(255,255,255,0.08); width: 38px; height: 38px; border-radius: 50%;
            border: none; color: #eee; font-size: 1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .icon-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px 20px 150px 20px; position: relative; }

        .glass-card {
            background: rgba(30, 30, 45, 0.6); backdrop-filter: blur(10px); border-radius: 16px;
            padding: 15px; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px;
        }

        .input-group { display: flex; gap: 8px; }
        .input-box {
            flex: 1; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 12px 15px; color: #fff; transition: 0.3s;
        }
        .input-box:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.15); }
        .search-btn { width: 48px; background: var(--primary-purple); border: none; border-radius: 10px; color: white; cursor: pointer; transition: 0.3s; }

        .song-list { display: flex; flex-direction: column; gap: 12px; }
        .song-item {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05); padding: 8px; border-radius: 12px; cursor: pointer; transition: 0.2s;
        }
        .song-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
        .song-info { flex: 1; overflow: hidden; }
        .song-title { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .song-artist { font-size: 0.75rem; color: #aaa; font-family: 'Courier Prime', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .song-action {
            width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; color: var(--accent-cyan);
            border: none; cursor: pointer; margin-left: 5px;
        }

        /* MINI PLAYER */
        .mini-player {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150px);
            width: 90%; background: rgba(20, 10, 30, 0.95); backdrop-filter: blur(15px);
            border: 1px solid var(--primary-purple); border-radius: 50px; padding: 8px 20px 8px 8px;
            display: flex; align-items: center; z-index: 90; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; visibility: hidden;
        }
        .mini-player.active { transform: translateX(-50%) translateY(0); opacity: 1; visibility: visible; }
        .mp-img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; animation: spin 5s linear infinite; animation-play-state: paused; border: 2px solid var(--accent-cyan); }
        .mp-img.playing { animation-play-state: running; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .mp-info { flex: 1; padding: 0 15px; overflow: hidden; }
        .mp-title { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mp-artist { font-size: 0.7rem; color: var(--accent-cyan); }
        .mp-controls { display: flex; gap: 10px; align-items: center; }
        .mp-btn-main { background: none; border: none; color: var(--accent-cyan); font-size: 1.3rem; cursor: pointer; }
        .mp-dl { color: #888; font-size: 1.1rem; text-decoration: none; transition: 0.2s; display: flex; align-items: center;}
        .mp-dl:hover { color: #fff; }

        /* SIDEBAR & OVERLAY */
        .sidebar {
            position: absolute; top: 0; left: -100%; width: var(--sidebar-width); height: 100%;
            background: #0b0b0b; z-index: 999; transition: left 0.3s; border-right: 1px solid var(--primary-purple);
            display: flex; flex-direction: column; box-shadow: 10px 0 50px rgba(0,0,0,0.5); overflow-y: auto; padding: 20px;
        }
        .sidebar.active { left: 0; }
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(2px);
            z-index: 998; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .playlist-box {
            background: rgba(30, 30, 45, 0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .playlist-info { flex: 1; }
        .playlist-name { font-weight: 700; color: #fff; font-size: 1rem; }
        .playlist-count { font-size: 0.75rem; color: var(--accent-cyan); font-family: 'Courier Prime'; }
        .playlist-actions { display: flex; gap: 10px; }
        .btn-play-all { color: #00f3ff; background: rgba(0, 243, 255, 0.1); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .btn-view { color: #fff; background: rgba(255, 255, 255, 0.1); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        .create-pl-group { display: flex; gap: 5px; margin-top: 10px; }
        .create-pl-group input { flex: 1; background: #111; border: 1px solid #333; padding: 10px; border-radius: 8px; color: white; }
        .create-pl-group button { background: var(--primary-purple); border: none; border-radius: 8px; padding: 0 15px; color: white; cursor: pointer; }

        /* MODAL ADD TO PLAYLIST */
        .modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: #111; border: 1px solid var(--accent-cyan); border-radius: 16px; padding: 20px;
            z-index: 2000; width: 85%; display: none; flex-direction: column; gap: 10px; opacity: 0; transition: 0.2s;
        }
        .modal.active { display: flex; transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .pl-option { padding: 10px; background: #1a1a1a; border-radius: 8px; cursor: pointer; margin-bottom: 5px; text-align: center; }

        .toast {
            position: absolute; top: 90px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(10, 10, 15, 0.95); border: 1px solid var(--accent-cyan); padding: 10px 20px; border-radius: 50px;
            color: #fff; font-size: 0.9rem; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 3000;
        }
        .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        .status-msg { text-align: center; padding: 30px; color: #777; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <button class="icon-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
            <div class="header-title">InuuTyzDev Music</div>
            <div style="width:38px;"></div>
        </header>

        <div class="main-content" id="main-content">
            <div class="glass-card" id="search-card">
                <div class="input-group">
                    <input type="text" class="input-box" id="search-input" placeholder="Cari lagu atau artis...">
                    <button class="search-btn" onclick="searchMusic()"><i class="fa-solid fa-search"></i></button>
                </div>
            </div>

            <div id="loading" class="status-msg" style="display: none;">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 1.8rem; color: var(--primary-purple);"></i>
                <p style="margin-top: 10px;">Mengakses Server api...</p>
            </div>

            <div class="song-list" id="song-list">
                <div class="status-msg">Cari lagu untuk memulai...</div>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <h2 style="margin-bottom: 20px; color: var(--accent-cyan); border-bottom: 1px solid #333; padding-bottom: 10px;">My Playlists</h2>
            <div id="playlist-container">
                </div>
            <div class="create-pl-group">
                <input type="text" id="new-pl-input" placeholder="Nama Playlist Baru">
                <button onclick="createNewPlaylist()"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <div class="modal" id="add-modal">
            <h3 style="color: var(--accent-cyan); text-align: center;">Pilih Playlist</h3>
            <div id="modal-pl-list"></div>
            <button style="padding: 10px; background: #333; color: white; border: none; border-radius: 8px; margin-top: 10px;" onclick="closeModal()">Batal</button>
        </div>

        <div class="mini-player" id="mini-player">
            <img src="https://via.placeholder.com/50" class="mp-img" id="mp-img">
            <div class="mp-info">
                <div class="mp-title" id="mp-title">Select Song</div>
                <div class="mp-artist" id="mp-artist">...</div>
            </div>
            <div class="mp-controls">
                <button class="mp-btn-main" onclick="togglePlay()"><i class="fa-solid fa-play" id="play-icon"></i></button>
                <a href="#" class="mp-dl" id="mp-dl" target="_blank" title="Download MP3">
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>
            <audio id="audio-player" playsinline preload="auto"></audio>
        </div>

        <div class="toast" id="toast">Message here</div>
    </div>

    <script>
        const utils = {
            toast: (msg) => {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 3000);
            },
            escAttr: (str) => str ? str.replace(/'/g, "&#39;").replace(/"/g, "&quot;") : ""
        };

        // ========== SYSTEM QUEUE (PLAYLIST AUTO-PLAY & LOOP) ==========
        let currentQueue = [];
        let queueIndex = 0;
        let isQueueActive = false;
        let pendingSongData = null;

        const audio = document.getElementById('audio-player');
        const playIcon = document.getElementById('play-icon');
        const mpImg = document.getElementById('mp-img');

        // Logic Loop Playlist
        audio.addEventListener('ended', () => {
            playIcon.className = "fa-solid fa-play";
            mpImg.classList.remove('playing');
            
            if (isQueueActive) {
                if (queueIndex < currentQueue.length - 1) {
                    queueIndex++; 
                } else {
                    queueIndex = 0; // Reset ke lagu pertama jika sudah habis (Loop)
                    utils.toast("Playlist diulang dari awal");
                }
                const nextSong = currentQueue[queueIndex];
                loadAndPlay(nextSong.url, nextSong.title, nextSong.artist, nextSong.img, true);
            }
        });

        function togglePlay() {
            if (audio.paused && audio.src) {
                audio.play(); playIcon.className = "fa-solid fa-pause"; mpImg.classList.add('playing');
            } else {
                audio.pause(); playIcon.className = "fa-solid fa-play"; mpImg.classList.remove('playing');
            }
        }

        // ========== CORE: FETCH AND PLAY ==========
        async function loadAndPlay(spotifyUrl, title, artist, img, fromQueue = false) {
            if (!fromQueue) isQueueActive = false; // Batalkan antrean jika user nge-klik manual

            document.getElementById('mp-title').innerText = title;
            document.getElementById('mp-artist').innerText = "Loading audio...";
            document.getElementById('mp-img').src = img;
            document.getElementById('mini-player').classList.add('active');
            
            try {
                const res = await fetch(`https://api.inuutyz.web.id/api/download/spotify?url=${encodeURIComponent(spotifyUrl)}`);
                const data = await res.json();

                if (!data.status || !data.result || !data.result.result || !data.result.result.download) {
                    throw new Error("Gagal parsing MP3");
                }

                const audioUrl = data.result.result.download.url;
                
                audio.src = audioUrl;
                audio.play();
                document.getElementById('mp-artist').innerText = artist;
                playIcon.className = "fa-solid fa-pause";
                mpImg.classList.add('playing');
                
                // Update link download
                document.getElementById('mp-dl').href = audioUrl;
                
                // Media Session Update
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: title, artist: artist, album: 'InuuTyzDev Music',
                        artwork: [{ src: img, sizes: '300x300', type: 'image/jpeg' }]
                    });
                }
            } catch (e) {
                utils.toast("Gagal memuat lagu dari server.");
                document.getElementById('mp-artist').innerText = "Error!";
                if(fromQueue) audio.dispatchEvent(new Event('ended')); // Lewati jika error di playlist
            }
        }

        // ========== CORE: SEARCH ==========
        async function searchMusic() {
            const query = document.getElementById('search-input').value.trim();
            const list = document.getElementById('song-list');
            const loading = document.getElementById('loading');
            
            if (!query) return utils.toast("Masukkan judul lagu!");
            
            list.innerHTML = ''; loading.style.display = 'block'; document.getElementById('search-input').blur();

            try {
                const res = await fetch(`https://api.inuutyz.web.id/api/search/spotify?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                loading.style.display = 'none';

                if (!data.status || !data.result || !data.result.result) return list.innerHTML = '<div class="status-msg">Lagu tidak ditemukan.</div>';
                
                const results = data.result.result;
                if (results.length === 0) return list.innerHTML = '<div class="status-msg">Lagu tidak ditemukan.</div>';

                results.forEach(song => {
                    const img = (song.album && song.album.images && song.album.images.length > 0) ? song.album.images[0].url : 'https://via.placeholder.com/300';
                    const title = song.name || 'Unknown';
                    const artist = (song.artists && song.artists.length > 0) ? song.artists[0].name : 'Unknown';
                    const url = song.url;

                    const card = document.createElement('div');
                    card.className = 'song-item';
                    
                    const songDataStr = utils.escAttr(JSON.stringify({ title, artist, img, url }));

                    card.innerHTML = `
                        <img src="${img}" class="song-img" onclick="loadAndPlay('${url}', '${utils.escAttr(title)}', '${utils.escAttr(artist)}', '${img}')">
                        <div class="song-info" onclick="loadAndPlay('${url}', '${utils.escAttr(title)}', '${utils.escAttr(artist)}', '${img}')">
                            <div class="song-title">${title}</div>
                            <div class="song-artist">${artist}</div>
                        </div>
                        <button class="song-action" onclick="openModal('${songDataStr}')"><i class="fa-solid fa-plus"></i></button>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                loading.style.display = 'none';
                list.innerHTML = `<div class="status-msg" style="color:#ff5555;">Koneksi Error: ${e.message}</div>`;
            }
        }

        // ========== PLAYLIST MANAGEMENT ==========
        function getPlaylists() {
            return JSON.parse(localStorage.getItem('inuutyzPlaylists')) || { "Playlist 1": [] };
        }
        function savePlaylists(data) {
            localStorage.setItem('inuutyzPlaylists', JSON.stringify(data));
            renderSidebar();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
            renderSidebar();
        }

        function renderSidebar() {
            const container = document.getElementById('playlist-container');
            const data = getPlaylists();
            container.innerHTML = '';

            Object.keys(data).forEach(plName => {
                const count = data[plName].length;
                container.innerHTML += `
                    <div class="playlist-box">
                        <div class="playlist-info">
                            <div class="playlist-name">${plName}</div>
                            <div class="playlist-count">${count} Lagu</div>
                        </div>
                        <div class="playlist-actions">
                            <button class="btn-play-all" onclick="playEntirePlaylist('${plName}')"><i class="fa-solid fa-play"></i></button>
                            <button class="btn-view" onclick="viewPlaylist('${plName}')"><i class="fa-solid fa-eye"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        function createNewPlaylist() {
            const name = document.getElementById('new-pl-input').value.trim();
            if(!name) return;
            const data = getPlaylists();
            if(data[name]) return utils.toast("Playlist sudah ada!");
            data[name] = [];
            savePlaylists(data);
            document.getElementById('new-pl-input').value = '';
        }

        function playEntirePlaylist(plName) {
            const data = getPlaylists();
            const list = data[plName];
            if(list.length === 0) return utils.toast("Playlist kosong!");

            currentQueue = list;
            queueIndex = 0;
            isQueueActive = true;
            toggleSidebar(); 
            utils.toast(`Memutar ${plName}`);
            
            const first = currentQueue[0];
            loadAndPlay(first.url, first.title, first.artist, first.img, true);
        }

        function viewPlaylist(plName) {
            const data = getPlaylists();
            const list = data[plName];
            toggleSidebar(); 
            
            document.getElementById('search-card').style.display = 'none';
            const mainList = document.getElementById('song-list');
            
            let html = `
                <div style="color:var(--accent-cyan); cursor:pointer; margin-bottom:15px;" onclick="backToSearch()">
                    <i class="fa-solid fa-arrow-left"></i> Kembali
                </div>
                <h2 style="margin-bottom:15px;">${plName}</h2>
            `;

            if(list.length === 0) html += `<div class="status-msg">Belum ada lagu.</div>`;

            list.forEach((song, idx) => {
                html += `
                    <div class="song-item">
                        <img src="${song.img}" class="song-img" onclick="loadAndPlay('${song.url}', '${utils.escAttr(song.title)}', '${utils.escAttr(song.artist)}', '${song.img}')">
                        <div class="song-info" onclick="loadAndPlay('${song.url}', '${utils.escAttr(song.title)}', '${utils.escAttr(song.artist)}', '${song.img}')">
                            <div class="song-title">${song.title}</div>
                            <div class="song-artist">${song.artist}</div>
                        </div>
                        <button class="song-action" style="color:#ff5555;" onclick="removeFromPlaylist('${plName}', ${idx})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
            });
            mainList.innerHTML = html;
        }

        function backToSearch() {
            document.getElementById('search-card').style.display = 'block';
            document.getElementById('song-list').innerHTML = '<div class="status-msg">Cari lagu untuk memulai...</div>';
            document.getElementById('search-input').value = '';
        }

        function removeFromPlaylist(plName, index) {
            const data = getPlaylists();
            data[plName].splice(index, 1);
            savePlaylists(data);
            viewPlaylist(plName); 
        }

        function openModal(songDataStr) {
            pendingSongData = JSON.parse(songDataStr);
            const data = getPlaylists();
            const listDiv = document.getElementById('modal-pl-list');
            listDiv.innerHTML = '';
            
            Object.keys(data).forEach(plName => {
                listDiv.innerHTML += `<div class="pl-option" onclick="addToPlaylist('${plName}')">${plName}</div>`;
            });
            
            document.getElementById('add-modal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('add-modal').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            pendingSongData = null;
        }

        function addToPlaylist(plName) {
            if(!pendingSongData) return;
            const data = getPlaylists();
            
            const isExist = data[plName].some(s => s.url === pendingSongData.url);
            if(isExist) {
                utils.toast("Lagu sudah ada di playlist ini!");
            } else {
                data[plName].push(pendingSongData);
                savePlaylists(data);
                utils.toast("Berhasil ditambahkan!");
            }
            closeModal();
        }

        // ========== INIT & PWA REGISTRATION ==========
        window.addEventListener('load', () => {
            if(!localStorage.getItem('inuutyzPlaylists')) {
                savePlaylists({ "Playlist 1": [] });
            }
            
            // Registrasi Service Worker untuk PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('InuuTyz Service Worker aktif!', reg.scope))
                    .catch(err => console.error('InuuTyz SW gagal:', err));
            }
        });
    </script>
</body>
</html>
